name: CI and Vercel Fallback Deploy

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

  deploy-vercel:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.ref_name == 'master'

    steps:
      - name: Explain deploy path when Vercel secrets are missing
        if: env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == ''
        run: |
          echo "GitHub Secrets for Vercel are not configured."
          echo "Skipping CLI deploy and relying on Vercel Git auto deployments for this push."

      - name: Checkout repository
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        uses: actions/checkout@v4

      - name: Use Node.js 24
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: vercel pull --yes --environment production --token "${VERCEL_TOKEN}"

      - name: Build with Vercel
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: vercel build --prod --token "${VERCEL_TOKEN}"

      - name: Deploy prebuilt output
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: vercel deploy --prebuilt --prod --token "${VERCEL_TOKEN}"
