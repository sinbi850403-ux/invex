<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INVEX | 스마트 재고·원가 관리</title>
  <meta name="description" content="INVEX - 중소기업을 위한 스마트 재고·원가·입출고 관리 플랫폼" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />
<link rel="stylesheet" href="/auth.css" />
</head>
<body>
  <!-- 🔒 로그인 게이트: 인증 전에는 앱 전체를 가림 -->
  <div id="auth-gate" class="auth-gate">
    <div class="auth-container">
      <div class="auth-logo">📦</div>
      <h1 class="auth-title">INVEX</h1>
      <p class="auth-subtitle">
        Inventory Expert<br/>중소기업 맞춤 재고·경영 관리 시스템
      </p>

      <!-- 탭 전환: 로그인 / 회원가입 -->
      <div id="auth-tabs" class="auth-tabs">
        <button id="tab-login" class="auth-tab active">로그인</button>
        <button id="tab-signup" class="auth-tab">회원가입</button>
      </div>

      <!-- 로그인 폼 -->
      <div id="form-login" class="auth-form">
        <div class="auth-field">
          <input id="login-email" class="auth-input" type="email" placeholder="이메일 주소" />
        </div>
        <div class="auth-field">
          <input id="login-password" class="auth-input" type="password" placeholder="비밀번호" />
        </div>
        <div class="auth-forgot">
          <a href="#" id="btn-forgot-pw" class="auth-link-small">비밀번호 찾기</a>
        </div>
        <button id="gate-email-login" class="auth-btn auth-btn-primary">이메일로 로그인</button>
      </div>

      <!-- 회원가입 폼 (숨김) -->
      <div id="form-signup" class="auth-form" style="display:none;">
        <div class="auth-field">
          <input id="signup-name" class="auth-input" type="text" placeholder="이름 (닉네임)" />
        </div>
        <div class="auth-field">
          <input id="signup-email" class="auth-input" type="email" placeholder="이메일 주소" />
        </div>
        <div class="auth-field">
          <input id="signup-password" class="auth-input" type="password" placeholder="비밀번호 (6자 이상)" />
        </div>
        <div class="auth-field">
          <input id="signup-password2" class="auth-input" type="password" placeholder="비밀번호 확인" />
        </div>

        <!-- 약관 동의 -->
        <div class="auth-field">
          <div class="auth-agree">
            <input type="checkbox" id="signup-agree" class="auth-checkbox" />
            <span>
              <a href="#" id="link-terms" class="auth-link-purple">서비스 이용약관</a> 및 
              <a href="#" id="link-privacy" class="auth-link-purple">개인정보처리방침</a>에 동의합니다. <span class="auth-required">*</span>
            </span>
          </div>
        </div>

        <button id="gate-email-signup" class="auth-btn auth-btn-signup">회원가입</button>
      </div>

      <!-- 구분선 -->
      <div class="auth-divider">
        <div class="auth-divider-line"></div>
        <span class="auth-divider-text">또는</span>
        <div class="auth-divider-line"></div>
      </div>

      <!-- 소셜 로그인 -->
      <button id="gate-google-login" class="auth-btn auth-btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18" alt="" />
        Google 계정으로 계속하기
      </button>

      <div id="gate-loading" class="auth-loading" style="display:none;">
        <div>🔄 인증 확인 중...</div>
      </div>

      <p class="auth-footer-text">
        로그인하면 <a href="/terms" target="_blank" class="auth-link-blue">이용약관</a> 및 
        <a href="/privacy" target="_blank" class="auth-link-blue">개인정보처리방침</a>에 동의하는 것으로 간주됩니다.
      </p>
      <div class="auth-security">
        <p>🔒 모든 데이터는 암호화되어 안전하게 보관됩니다</p>
      </div>
    </div>
  </div>

  <!-- 모바일 토글 버튼 -->
  <button class="mobile-toggle" id="mobile-toggle">☰</button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div id="app">
    <!-- 사이드 네비게이션 -->
    <aside id="sidebar">
      <div class="sidebar-logo">
        <div>
          INVEX
          <span class="logo-sub">Inventory Expert</span>
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <!-- 홈 -->
      <nav style="padding:0 12px;">
        <button class="nav-btn active" data-page="home">
          <span class="nav-icon">🏠</span> 대시보드
        </button>
      </nav>

      <div class="sidebar-divider"></div>

      <!-- 데이터 -->
      <div class="nav-section">
        <div class="nav-section-title">데이터</div>
      </div>
      <nav id="nav">
        <button class="nav-btn" data-page="upload">
          <span class="nav-icon">📂</span> 파일 업로드
        </button>
        <button class="nav-btn" data-page="mapping">
          <span class="nav-icon">📋</span> 데이터 확인
        </button>
      </nav>

      <div class="sidebar-divider"></div>

      <!-- 관리 -->
      <div class="nav-section">
        <div class="nav-section-title">관리</div>
      </div>
      <nav id="nav2">
        <button class="nav-btn" data-page="inventory">
          <span class="nav-icon">📦</span> 재고 현황
        </button>
        <button class="nav-btn" data-page="inout">
          <span class="nav-icon">🔄</span> 입출고 관리
        </button>
        <button class="nav-btn" data-page="bulk">
          <span class="nav-icon">⚡</span> 일괄 처리
        </button>
        <!-- 바코드 스캔 — 추후 오픈 예정 (display:none 제거하면 복원) -->
        <button class="nav-btn" data-page="scanner" style="display:none;">
          <span class="nav-icon">📱</span> 바코드 스캔
        </button>
        <button class="nav-btn" data-page="labels">
          <span class="nav-icon">🏷️</span> 라벨 인쇄
        </button>
        <button class="nav-btn" data-page="warehouses">
          <span class="nav-icon">🏢</span> 다중 창고 관리
        </button>
        <button class="nav-btn" data-page="transfer">
          <span class="nav-icon">🏭</span> 창고 이동
        </button>
        <button class="nav-btn" data-page="stocktake">
          <span class="nav-icon">📋</span> 재고 실사
        </button>
        <button class="nav-btn" data-page="vendors">
          <span class="nav-icon">🤝</span> 거래처 관리
        </button>
        <button class="nav-btn" data-page="auto-order">
          <span class="nav-icon">🤖</span> 자동 발주 추천
        </button>
        <button class="nav-btn" data-page="orders">
          <span class="nav-icon">📋</span> 발주 이력
        </button>
      </nav>

      <div class="sidebar-divider"></div>

      <!-- 보고 -->
      <div class="nav-section">
        <div class="nav-section-title">보고</div>
      </div>
      <nav id="nav3">
        <button class="nav-btn" data-page="summary">
          <span class="nav-icon">📊</span> 요약 보고
        </button>
        <button class="nav-btn" data-page="dashboard">
          <span class="nav-icon">📈</span> 고급 분석
        </button>
        <button class="nav-btn" data-page="costing">
          <span class="nav-icon">💰</span> 원가 분석
        </button>
        <button class="nav-btn" data-page="accounts">
          <span class="nav-icon">💳</span> 매출/매입
        </button>
        <button class="nav-btn" data-page="ledger">
          <span class="nav-icon">📒</span> 수불부
        </button>
        <button class="nav-btn" data-page="documents">
          <span class="nav-icon">📄</span> 문서 생성
        </button>
        <button class="nav-btn" data-page="tax-reports">
          <span class="nav-icon">📑</span> 세무/회계 서류
        </button>
        <button class="nav-btn" data-page="profit">
          <span class="nav-icon">💹</span> 손익 분석
        </button>
        <button class="nav-btn" data-page="auditlog">
          <span class="nav-icon">📝</span> 감사 추적
        </button>
      </nav>

      <div class="sidebar-divider"></div>

      <!-- 설정 -->
      <nav style="padding:0 12px;">
        <button class="nav-btn" data-page="settings">
          <span class="nav-icon">⚙️</span> 설정
        </button>
        <button class="nav-btn" data-page="team">
          <span class="nav-icon">👥</span> 팀 관리
        </button>
        <button class="nav-btn" data-page="backup">
          <span class="nav-icon">💾</span> 백업/복원
        </button>
        <button class="nav-btn" data-page="roles">
          <span class="nav-icon">🔐</span> 권한 관리
        </button>
        <!-- API 연동 — 추후 오픈 예정 (display:none 제거하면 복원) -->
        <button class="nav-btn" data-page="api" style="display:none;">
          <span class="nav-icon">🔌</span> API 연동
        </button>
        <button class="nav-btn" data-page="billing">
          <span class="nav-icon">💳</span> 구독 관리
        </button>
        <button class="nav-btn" data-page="admin">
          <span class="nav-icon">👑</span> 관리자
        </button>
      </nav>

      <div class="sidebar-divider"></div>

      <!-- 지원 -->
      <nav style="padding:0 12px;">
        <button class="nav-btn" data-page="mypage">
          <span class="nav-icon">👤</span> 마이페이지
        </button>
        <button class="nav-btn" data-page="guide">
          <span class="nav-icon">📖</span> 사용 가이드
        </button>
        <button class="nav-btn" data-page="support">
          <span class="nav-icon">💬</span> 고객 문의
        </button>
      </nav>

      <div class="sidebar-footer">
        <div style="display:flex; gap:4px; margin-bottom:8px; align-items:center;">
          <button class="btn btn-ghost btn-sm" id="btn-global-search" style="color:rgba(255,255,255,0.7); font-size:12px;" title="검색 (Ctrl+K)">
            🔍 검색
          </button>
          <button class="btn btn-ghost btn-sm" id="btn-notifications" style="color:rgba(255,255,255,0.7); font-size:12px; position:relative;" title="알림">
            🔔 알림 <span class="notif-badge" id="notif-badge"></span>
          </button>
          <button class="btn btn-ghost btn-sm" id="btn-theme-toggle" style="color:rgba(255,255,255,0.7); font-size:12px;" title="테마 전환">
            🌙 다크
          </button>
        </div>
        <div style="display:flex; gap:4px; margin-bottom:8px; align-items:center;">
          <button class="btn btn-ghost btn-sm" id="btn-backup" style="color:rgba(255,255,255,0.5); font-size:11px;" title="데이터 백업">💾 백업</button>
          <button class="btn btn-ghost btn-sm" id="btn-restore" style="color:rgba(255,255,255,0.5); font-size:11px;" title="데이터 복원">📥 복원</button>
        </div>
        <input type="file" id="restore-input" accept=".json" style="display:none" />
        <!-- 사용자 로그인 영역 -->
        <div id="user-info-area" style="margin-bottom:8px;"></div>
        <!-- 현재 요금제 표시 -->
        <div id="plan-display" style="margin-bottom:8px; padding:6px 10px; border-radius:6px; background:rgba(255,255,255,0.06); text-align:center; cursor:pointer;" title="요금제 변경">
          <span id="plan-name" style="font-size:11px; font-weight:600;">🆓 Free</span>
        </div>
        INVEX v3.0<br/>
        © 2026
      </div>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main id="main-content"></main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
