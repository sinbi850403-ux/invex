<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INVEX | 스마트 재고·원가 관리</title>
  <meta name="description" content="INVEX - 중소기업을 위한 스마트 재고·원가·입출고 관리 플랫폼" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />
</head>
<body>
  <!-- 🔒 로그인 게이트: 인증 전에는 앱 전체를 가림 -->
  <div id="auth-gate" style="
    position:fixed; inset:0; z-index:9999;
    background:var(--bg-primary, #0f172a);
    display:flex; align-items:center; justify-content:center;
    transition: opacity 0.3s ease;
  ">
    <div style="text-align:center; max-width:420px; padding:40px 24px; width:100%;">
      <div style="font-size:56px; margin-bottom:16px; filter:drop-shadow(0 4px 12px rgba(59,130,246,0.3));">📦</div>
      <h1 style="font-size:32px; font-weight:800; margin-bottom:4px; background:linear-gradient(135deg,#3b82f6,#8b5cf6); background-clip:text; -webkit-background-clip:text; -webkit-text-fill-color:transparent;">INVEX</h1>
      <p style="font-size:13px; color:var(--text-muted, #94a3b8); margin-bottom:24px; line-height:1.6;">
        Inventory Expert<br/>중소기업 맞춤 재고·경영 관리 시스템
      </p>

      <!-- 탭 전환: 로그인 / 회원가입 -->
      <div id="auth-tabs" style="display:flex; margin-bottom:20px; border-radius:8px; overflow:hidden; border:1px solid rgba(255,255,255,0.1);">
        <button id="tab-login" class="auth-tab active" style="flex:1; padding:10px; border:none; font-size:13px; font-weight:600; cursor:pointer; background:rgba(59,130,246,0.15); color:#3b82f6; transition:all 0.2s;">로그인</button>
        <button id="tab-signup" class="auth-tab" style="flex:1; padding:10px; border:none; font-size:13px; font-weight:600; cursor:pointer; background:transparent; color:var(--text-muted, #94a3b8); transition:all 0.2s;">회원가입</button>
      </div>

      <!-- 로그인 폼 -->
      <div id="form-login" style="margin-bottom:16px;">
        <div style="margin-bottom:10px;">
          <input id="login-email" type="email" placeholder="이메일 주소" style="
            width:100%; padding:12px 14px; border:1px solid rgba(255,255,255,0.12); border-radius:8px;
            background:rgba(255,255,255,0.05); color:var(--text-primary, #e2e8f0);
            font-size:14px; outline:none; box-sizing:border-box;
            transition:border-color 0.2s;
          " onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='rgba(255,255,255,0.12)'" />
        </div>
        <div style="margin-bottom:10px;">
          <input id="login-password" type="password" placeholder="비밀번호" style="
            width:100%; padding:12px 14px; border:1px solid rgba(255,255,255,0.12); border-radius:8px;
            background:rgba(255,255,255,0.05); color:var(--text-primary, #e2e8f0);
            font-size:14px; outline:none; box-sizing:border-box;
            transition:border-color 0.2s;
          " onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='rgba(255,255,255,0.12)'" />
        </div>
        <div style="text-align:right; margin-bottom:14px;">
          <a href="#" id="btn-forgot-pw" style="font-size:11px; color:#3b82f6; text-decoration:none;">비밀번호 찾기</a>
        </div>
        <button id="gate-email-login" style="
          width:100%; padding:13px; border:none; border-radius:8px;
          background:linear-gradient(135deg,#3b82f6,#2563eb); color:#fff;
          font-size:14px; font-weight:600; cursor:pointer;
          transition:transform 0.2s, box-shadow 0.2s;
          box-shadow:0 4px 16px rgba(59,130,246,0.3);
        ">이메일로 로그인</button>
      </div>

      <!-- 회원가입 폼 (숨김) -->
      <div id="form-signup" style="display:none; margin-bottom:16px;">
        <div style="margin-bottom:10px;">
          <input id="signup-name" type="text" placeholder="이름 (닉네임)" style="
            width:100%; padding:12px 14px; border:1px solid rgba(255,255,255,0.12); border-radius:8px;
            background:rgba(255,255,255,0.05); color:var(--text-primary, #e2e8f0);
            font-size:14px; outline:none; box-sizing:border-box;
          " onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='rgba(255,255,255,0.12)'" />
        </div>
        <div style="margin-bottom:10px;">
          <input id="signup-email" type="email" placeholder="이메일 주소" style="
            width:100%; padding:12px 14px; border:1px solid rgba(255,255,255,0.12); border-radius:8px;
            background:rgba(255,255,255,0.05); color:var(--text-primary, #e2e8f0);
            font-size:14px; outline:none; box-sizing:border-box;
          " onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='rgba(255,255,255,0.12)'" />
        </div>
        <div style="margin-bottom:10px;">
          <input id="signup-password" type="password" placeholder="비밀번호 (6자 이상)" style="
            width:100%; padding:12px 14px; border:1px solid rgba(255,255,255,0.12); border-radius:8px;
            background:rgba(255,255,255,0.05); color:var(--text-primary, #e2e8f0);
            font-size:14px; outline:none; box-sizing:border-box;
          " onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='rgba(255,255,255,0.12)'" />
        </div>
        <div style="margin-bottom:14px;">
          <input id="signup-password2" type="password" placeholder="비밀번호 확인" style="
            width:100%; padding:12px 14px; border:1px solid rgba(255,255,255,0.12); border-radius:8px;
            background:rgba(255,255,255,0.05); color:var(--text-primary, #e2e8f0);
            font-size:14px; outline:none; box-sizing:border-box;
          " onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='rgba(255,255,255,0.12)'" />
        </div>

        <!-- 약관 동의 -->
        <div style="margin-bottom:14px;">
          <label style="display:flex; align-items:flex-start; gap:8px; cursor:pointer; font-size:12px; color:var(--text-muted, #94a3b8);">
            <input type="checkbox" id="signup-agree" style="margin-top:2px; accent-color:#8b5cf6; width:16px; height:16px; flex-shrink:0;" />
            <span>
              <a href="#" id="link-terms" style="color:#8b5cf6; text-decoration:underline;">서비스 이용약관</a> 및 
              <a href="#" id="link-privacy" style="color:#8b5cf6; text-decoration:underline;">개인정보처리방침</a>에 동의합니다. <span style="color:#ef4444;">*</span>
            </span>
          </label>
        </div>

        <button id="gate-email-signup" style="
          width:100%; padding:13px; border:none; border-radius:8px;
          background:linear-gradient(135deg,#8b5cf6,#6d28d9); color:#fff;
          font-size:14px; font-weight:600; cursor:pointer;
          transition:transform 0.2s, box-shadow 0.2s;
          box-shadow:0 4px 16px rgba(139,92,246,0.3);
        ">회원가입</button>
      </div>

      <!-- 구분선 -->
      <div style="display:flex; align-items:center; gap:12px; margin:16px 0;">
        <div style="flex:1; height:1px; background:rgba(255,255,255,0.08);"></div>
        <span style="font-size:11px; color:var(--text-muted, #64748b);">또는</span>
        <div style="flex:1; height:1px; background:rgba(255,255,255,0.08);"></div>
      </div>

      <!-- 소셜 로그인 -->
      <button id="gate-google-login" style="
        width:100%; padding:12px 24px; border:1px solid rgba(255,255,255,0.12); border-radius:8px;
        background:rgba(255,255,255,0.03); color:var(--text-primary, #e2e8f0);
        font-size:13px; font-weight:500; cursor:pointer;
        display:flex; align-items:center; justify-content:center; gap:10px;
        transition:background 0.2s, border-color 0.2s;
      " onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.borderColor='rgba(255,255,255,0.2)';"
         onmouseout="this.style.background='rgba(255,255,255,0.03)'; this.style.borderColor='rgba(255,255,255,0.12)';">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18" alt="" />
        Google 계정으로 계속하기
      </button>

      <div id="gate-loading" style="display:none; margin-top:20px;">
        <div style="font-size:14px; color:var(--text-muted, #94a3b8);">🔄 인증 확인 중...</div>
      </div>

      <p style="color:var(--text-muted, #64748b); font-size:11px; margin-top:20px; line-height:1.6;">
        로그인하면 <a href="/terms" target="_blank" style="color:#3b82f6;">이용약관</a> 및 
        <a href="/privacy" target="_blank" style="color:#3b82f6;">개인정보처리방침</a>에 동의하는 것으로 간주됩니다.
      </p>
      <div style="margin-top:16px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.06);">
        <p style="font-size:11px; color:var(--text-muted, #475569);">
          🔒 모든 데이터는 암호화되어 안전하게 보관됩니다
        </p>
      </div>
    </div>
  </div>

  <!-- 모바일 토글 버튼 -->
  <button class="mobile-toggle" id="mobile-toggle">☰</button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div id="app">
    <!-- 사이드 네비게이션 -->
    <aside id="sidebar">
      <div class="sidebar-logo">
        <div>
          INVEX
          <span class="logo-sub">Inventory Expert</span>
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <!-- 홈 -->
      <nav style="padding:0 12px;">
        <button class="nav-btn active" data-page="home">
          <span class="nav-icon">🏠</span> 대시보드
        </button>
      </nav>

      <div class="sidebar-divider"></div>

      <!-- 데이터 -->
      <div class="nav-section">
        <div class="nav-section-title">데이터</div>
      </div>
      <nav id="nav">
        <button class="nav-btn" data-page="upload">
          <span class="nav-icon">📂</span> 파일 업로드
        </button>
        <button class="nav-btn" data-page="mapping">
          <span class="nav-icon">📋</span> 데이터 확인
        </button>
      </nav>

      <div class="sidebar-divider"></div>

      <!-- 관리 -->
      <div class="nav-section">
        <div class="nav-section-title">관리</div>
      </div>
      <nav id="nav2">
        <button class="nav-btn" data-page="inventory">
          <span class="nav-icon">📦</span> 재고 현황
        </button>
        <button class="nav-btn" data-page="inout">
          <span class="nav-icon">🔄</span> 입출고 관리
        </button>
        <button class="nav-btn" data-page="bulk">
          <span class="nav-icon">⚡</span> 일괄 처리
        </button>
        <button class="nav-btn" data-page="scanner">
          <span class="nav-icon">📱</span> 바코드 스캔
        </button>
        <button class="nav-btn" data-page="labels">
          <span class="nav-icon">🏷️</span> 라벨 인쇄
        </button>
        <button class="nav-btn" data-page="warehouses">
          <span class="nav-icon">🏢</span> 다중 창고 관리
        </button>
        <button class="nav-btn" data-page="transfer">
          <span class="nav-icon">🏭</span> 창고 이동
        </button>
        <button class="nav-btn" data-page="stocktake">
          <span class="nav-icon">📋</span> 재고 실사
        </button>
        <button class="nav-btn" data-page="vendors">
          <span class="nav-icon">🤝</span> 거래처 관리
        </button>
      </nav>

      <div class="sidebar-divider"></div>

      <!-- 보고 -->
      <div class="nav-section">
        <div class="nav-section-title">보고</div>
      </div>
      <nav id="nav3">
        <button class="nav-btn" data-page="summary">
          <span class="nav-icon">📊</span> 요약 보고
        </button>
        <button class="nav-btn" data-page="dashboard">
          <span class="nav-icon">📈</span> 고급 분석
        </button>
        <button class="nav-btn" data-page="costing">
          <span class="nav-icon">💰</span> 원가 분석
        </button>
        <button class="nav-btn" data-page="accounts">
          <span class="nav-icon">💳</span> 매출/매입
        </button>
        <button class="nav-btn" data-page="ledger">
          <span class="nav-icon">📒</span> 수불부
        </button>
        <button class="nav-btn" data-page="documents">
          <span class="nav-icon">📄</span> 문서 생성
        </button>
        <button class="nav-btn" data-page="auditlog">
          <span class="nav-icon">📝</span> 감사 추적
        </button>
      </nav>

      <div class="sidebar-divider"></div>

      <!-- 설정 -->
      <nav style="padding:0 12px;">
        <button class="nav-btn" data-page="settings">
          <span class="nav-icon">⚙️</span> 설정
        </button>
        <button class="nav-btn" data-page="roles">
          <span class="nav-icon">🔐</span> 권한 관리
        </button>
        <button class="nav-btn" data-page="api">
          <span class="nav-icon">🔌</span> API 연동
        </button>
        <button class="nav-btn" data-page="billing">
          <span class="nav-icon">💳</span> 구독 관리
        </button>
        <button class="nav-btn" data-page="admin">
          <span class="nav-icon">👑</span> 관리자
        </button>
      </nav>

      <div class="sidebar-divider"></div>

      <!-- 지원 -->
      <nav style="padding:0 12px;">
        <button class="nav-btn" data-page="mypage">
          <span class="nav-icon">👤</span> 마이페이지
        </button>
        <button class="nav-btn" data-page="guide">
          <span class="nav-icon">📖</span> 사용 가이드
        </button>
        <button class="nav-btn" data-page="support">
          <span class="nav-icon">💬</span> 고객 문의
        </button>
      </nav>

      <div class="sidebar-footer">
        <div style="display:flex; gap:4px; margin-bottom:8px; align-items:center;">
          <button class="btn btn-ghost btn-sm" id="btn-global-search" style="color:rgba(255,255,255,0.7); font-size:12px;" title="검색 (Ctrl+K)">
            🔍 검색
          </button>
          <button class="btn btn-ghost btn-sm" id="btn-notifications" style="color:rgba(255,255,255,0.7); font-size:12px; position:relative;" title="알림">
            🔔 알림 <span class="notif-badge" id="notif-badge"></span>
          </button>
          <button class="btn btn-ghost btn-sm" id="btn-theme-toggle" style="color:rgba(255,255,255,0.7); font-size:12px;" title="테마 전환">
            🌙 다크
          </button>
        </div>
        <div style="display:flex; gap:4px; margin-bottom:8px; align-items:center;">
          <button class="btn btn-ghost btn-sm" id="btn-backup" style="color:rgba(255,255,255,0.5); font-size:11px;" title="데이터 백업">💾 백업</button>
          <button class="btn btn-ghost btn-sm" id="btn-restore" style="color:rgba(255,255,255,0.5); font-size:11px;" title="데이터 복원">📥 복원</button>
        </div>
        <input type="file" id="restore-input" accept=".json" style="display:none" />
        <!-- 사용자 로그인 영역 -->
        <div id="user-info-area" style="margin-bottom:8px;"></div>
        <!-- 현재 요금제 표시 -->
        <div id="plan-display" style="margin-bottom:8px; padding:6px 10px; border-radius:6px; background:rgba(255,255,255,0.06); text-align:center; cursor:pointer;" title="요금제 변경">
          <span id="plan-name" style="font-size:11px; font-weight:600;">🆓 Free</span>
        </div>
        INVEX v3.0<br/>
        © 2026
      </div>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main id="main-content"></main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
